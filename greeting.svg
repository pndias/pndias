<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80">
  <style>
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { opacity: 0 } }
    .terminal-bg { fill: #1a1b26; rx: 8; }
    .prompt { font-family: 'Courier New', monospace; font-size: 22px; fill: #7aa2f7; }
    .text { font-family: 'Courier New', monospace; font-size: 22px; fill: #c0caf5; }
    .cursor { animation: blink 1s step-end infinite; fill: #c0caf5; }
    .typing-mask { animation: typing 2.5s steps(24) 0.5s forwards; overflow: hidden; white-space: nowrap; width: 0; }
  </style>
  <rect class="terminal-bg" width="600" height="80" />
  <!-- dots -->
  <circle cx="20" cy="16" r="5" fill="#f7768e"/>
  <circle cx="38" cy="16" r="5" fill="#e0af68"/>
  <circle cx="56" cy="16" r="5" fill="#9ece6a"/>
  <foreignObject x="16" y="32" width="580" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;">
      <span style="font-family:Courier New,monospace;font-size:22px;color:#7aa2f7;">❯&nbsp;</span>
      <div class="typing-mask">
        <span style="font-family:Courier New,monospace;font-size:22px;color:#c0caf5;white-space:nowrap;">Hey, I'm Pablo Dias 👋</span>
      </div>
      <span class="cursor" style="font-family:Courier New,monospace;font-size:22px;">▌</span>
    </div>
  </foreignObject>
</svg>
